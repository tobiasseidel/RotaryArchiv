[pytest]
# Pytest Konfiguration für RotaryArchiv

# Test-Pfade
testpaths = tests

# Python-Dateien als Tests erkennen
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markierungen
markers =
    slow: Langsame Tests (können mit -m "not slow" übersprungen werden)
    integration: Integration-Tests (benötigen externe Services)
    unit: Unit-Tests (schnell, isoliert)
    ocr: OCR-bezogene Tests
    wikidata: Wikidata-bezogene Tests
    api: API-Endpoint Tests

# Coverage-Einstellungen
addopts =
    --verbose
    --strict-markers
    --cov=src.rotary_archiv
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=5
    --tb=short

# Coverage-Ausschlüsse
[coverage:run]
source = src/rotary_archiv
omit =
    */tests/*
    */__pycache__/*
    */venv/*
    */migrations/*
    */alembic/*

[coverage:report]
# Zeige nur Zeilen mit fehlender Coverage
precision = 2
show_missing = true
skip_covered = false

# Ausschlüsse für Coverage-Report
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
