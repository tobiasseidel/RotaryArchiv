version: '3.8'

services:
  backend:
    build: .
    container_name: rotary_backend
    ports:
      - "${BACKEND_PORT:-8085}:8000"
    volumes:
      - ${DATA_DIR:-/Volume1/RotaryArchiv}/data:/app/data
    env_file:
      - .env.docker
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-sqlite}
      - DOCUMENTS_PATH=${DOCUMENTS_PATH:-/app/data/documents}
      - TRIPLESTORE_PATH=${TRIPLESTORE_PATH:-/app/data/triplestore.ttl}
      - SQLITE_PATH=${SQLITE_PATH:-/app/data/rotary_archiv.db}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-deepseek-ocr:latest}
      - OLLAMA_GPT_MODEL=${OLLAMA_GPT_MODEL:-gpt-oss:20b}
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-7200}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - DEBUG=${DEBUG:-True}
    restart: unless-stopped

  worker:
    build: .
    container_name: rotary_worker
    command: ["python", "-m", "src.rotary_archiv.ocr.worker"]
    volumes:
      - ${DATA_DIR:-/Volume1/RotaryArchiv}/data:/app/data
    env_file:
      - .env.docker
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-sqlite}
      - DOCUMENTS_PATH=${DOCUMENTS_PATH:-/app/data/documents}
      - SQLITE_PATH=${SQLITE_PATH:-/app/data/rotary_archiv.db}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-deepseek-ocr:latest}
      - OLLAMA_GPT_MODEL=${OLLAMA_GPT_MODEL:-gpt-oss:20b}
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-7200}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: nginx-frontend/Dockerfile
    container_name: rotary_frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
