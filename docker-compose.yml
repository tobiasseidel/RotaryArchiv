version: '3.8'

services:
  backend:
    build: .
    container_name: rotary_backend
    ports:
      - "8085:8000"
    volumes:
      - /Volume1/RotaryArchiv/data:/app/data
    environment:
      - POSTGRES_HOST=sqlite
      - DOCUMENTS_PATH=/app/data/documents
      - TRIPLESTORE_PATH=/app/data/triplestore.ttl
      - SQLITE_PATH=/app/data/rotary_archiv.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_VISION_MODEL=deepseek-ocr:latest
      - OLLAMA_GPT_MODEL=gpt-oss:20b
      - OLLAMA_TIMEOUT_SECONDS=7200
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=True
    restart: unless-stopped

  worker:
    build: .
    container_name: rotary_worker
    command: ["python", "-m", "src.rotary_archiv.ocr.worker"]
    volumes:
      - /Volume1/RotaryArchiv/data:/app/data
    environment:
      - POSTGRES_HOST=sqlite
      - DOCUMENTS_PATH=/app/data/documents
      - SQLITE_PATH=/app/data/rotary_archiv.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_VISION_MODEL=deepseek-ocr:latest
      - OLLAMA_GPT_MODEL=gpt-oss:20b
      - OLLAMA_TIMEOUT_SECONDS=7200
    restart: unless-stopped
