<svg xmlns="http://www.w3.org/2000/svg" width="600" height="850" viewBox="0 0 600 850">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Lora:ital,wght@0,400;0,700;1,400&amp;display=swap');
      text { font-family: 'Courier New', 'Liberation Mono', monospace; }
    </style>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
  </defs>
  <rect width="600" height="850" fill="#F5F0E8"/>
  <rect x="40" y="40" width="520" height="770" fill="#FDFAF5" stroke="#D6CFC4" stroke-width="1"/>
  <rect x="48" y="48" width="504" height="754" fill="none" stroke="#E8E4DB" stroke-width="0.5"/>
  <circle cx="75" cy="75" r="3" fill="#D6CFC4"/>
  <circle cx="525" cy="75" r="3" fill="#D6CFC4"/>
  <text x="300" y="95" font-family="'Lora', serif" font-size="20" font-weight="700" text-anchor="middle" fill="#1C1917">Protokoll</text>
  <text x="300" y="125" font-family="'Inter', sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#57534E">Rotary Club Dresden</text>
  <line x1="60" y1="145" x2="540" y2="145" stroke="#D6CFC4" stroke-width="0.5"/>
  <text x="65" y="170" font-family="'Courier New', monospace" font-size="12" fill="#1C1917">No. 47</text>
  <text x="65" y="190" font-family="'Courier New', monospace" font-size="12" fill="#1C1917">Datum: 9. M&auml;rz 1934</text>
  <text x="65" y="210" font-family="'Courier New', monospace" font-size="12" fill="#1C1917">Ort: Dresden, Hotel Bellevue</text>
  <line x1="60" y1="225" x2="540" y2="225" stroke="#D6CFC4" stroke-width="0.5"/>
  <text x="65" y="250" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">Vorsitz: Victor Klemperer von Klemenau</text>
  <text x="65" y="270" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">Anwesend: Fritz Busch, Erich Haenel,</text>
  <text x="65" y="288" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">          Walter Bachmann, Hugo Grille</text>
  <text x="65" y="308" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">Entschuldigt: Heinrich Arnhold</text>
  <line x1="60" y1="325" x2="540" y2="325" stroke="#D6CFC4" stroke-width="0.5"/>
  <text x="65" y="350" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">Der Vorsitzende er&ouml;ffnet die Sitzung um 19 Uhr.</text>
  <text x="65" y="370" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">TOP 1: Genehmigung des letzten Protokolls</text>
  <text x="65" y="390" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">  Das Protokoll der 46. Sitzung wird genehmigt.</text>
  <text x="65" y="410" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">TOP 2: R&uuml;cktritt Heinrich Arnhold</text>
  <text x="65" y="430" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">  Herr Arnhold tritt aus gesundheitlichen Gr&uuml;nden</text>
  <text x="65" y="448" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">  von seinem Amt zur&uuml;ck. Der Club dankt ihm f&uuml;r</text>
  <text x="65" y="466" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">  seine langj&auml;hrige Treue und Verdienste.</text>
  <text x="65" y="486" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">TOP 3: Kassenbericht</text>
  <text x="65" y="506" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">  Der Kassenbericht f&uuml;r das Jahr 1933 wird</text>
  <text x="65" y="524" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">  verlesen und einstimmig angenommen.</text>
  <text x="65" y="544" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">TOP 4: Verschiedenes</text>
  <text x="65" y="564" font-family="'Courier New', monospace" font-size="11" fill="#1C1917">  N&auml;chste Sitzung: 13. April 1934, 19 Uhr.</text>
  <text x="65" y="594" font-family="'Courier New', monospace" font-size="11" fill="#57534E">Schluss der Sitzung: 21:30 Uhr.</text>
  <text x="65" y="614" font-family="'Courier New', monospace" font-size="11" fill="#57534E">gez. Klemperer, Vorsitzender</text>
  <text x="65" y="634" font-family="'Courier New', monospace" font-size="11" fill="#57534E">gez. Busch, Schriftf&uuml;hrer</text>
  <line x1="60" y1="655" x2="540" y2="655" stroke="#D6CFC4" stroke-width="0.5"/>
  <text x="300" y="680" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle" fill="#A09890">— Digitalisiertes Archivdokument (Platzhalter) —</text>
</svg>
